<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.3">
</head>

<body>
    <div class="glass-container">

        <!-- Screen 0: Login -->
        <div id="screen-login" class="screen active">
            <h1>Gym Tracker</h1>
            <p>Ingresa tu correo para comenzar</p>
            <div class="input-field" style="margin-bottom: 1.5rem;">
                <label>Correo Electrónico</label>
                <input type="email" id="input-email" placeholder="tu@correo.com" autocomplete="email">
            </div>
            <button id="btn-login" class="btn-primary">Entrar</button>
        </div>

        <!-- Screen 1: Start Day -->
        <div id="screen-home" class="screen hidden">
            <h1>Gym Tracker</h1>
            <p>Registra tu entrenamiento de hoy</p>
            <button id="btn-start-day" class="btn-primary">Iniciar Entrenamiento</button>
            <div id="consistency-tracker" class="consistency-container"></div>
        </div>

        <!-- Screen 1.5: Select Day -->
        <div id="screen-select-day" class="screen hidden" style="position: relative;">
            <button id="btn-back-home" class="btn-icon">← Volver al Inicio</button>
            <h2>Selecciona tu Día</h2>
            <div class="exercise-list" id="day-list">
                <!-- populated by JS -->
            </div>
            <button id="btn-add-day" class="fab-btn">+</button>
        </div>

        <!-- Screen 2: Select Exercise -->
        <div id="screen-exercises" class="screen hidden" style="position: relative;">
            <button id="btn-back-days" class="btn-icon">← Volver a Días</button>
            <h2 id="current-day-title">Ejercicios</h2>
            <div class="exercise-list" id="exercise-list">
                <!-- populated by JS -->
            </div>
            <button id="btn-add-exercise" class="fab-btn">+</button>
        </div>

        <!-- Screen 3: Active Exercise Log -->
        <div id="screen-active-exercise" class="screen hidden">
            <button id="btn-back-exercises" class="btn-icon">← Volver</button>
            <h2 id="current-exercise-name">Ejercicio</h2>

            <div class="exercise-description" id="exercise-description" style="position: relative;">
                <button id="btn-edit-desc" class="edit-btn">✎</button>
                <div class="desc-item">
                    <span class="desc-label">Trabajo Efectivo:</span>
                    <span class="desc-value" id="desc-trabajo">-</span>
                </div>
                <div class="desc-item">
                    <span class="desc-label">Intensidad:</span>
                    <span class="desc-value" id="desc-intensidad">-</span>
                </div>
            </div>

            <div class="week-navigation">
                <button id="btn-prev-week" class="btn-icon">❮</button>
                <h3 id="current-week-label" class="week-label">Semana 1</h3>
                <button id="btn-next-week" class="btn-icon">❯</button>
                <button id="btn-add-week" class="week-nav-btn" style="display:none">+</button>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <label>Repeticiones</label>
                    <input type="number" id="input-reps" placeholder="0">
                </div>
                <div class="input-field">
                    <label>Kilos</label>
                    <input type="number" id="input-weight" placeholder="0" step="any">
                </div>
            </div>

            <button id="btn-save-set" class="btn-primary">Guardar Serie</button>

            <div class="sets-log">
                <h3>Series Registradas</h3>
                <ul id="sets-list">
                    <!-- populated by JS -->
                </ul>
            </div>

            <button id="btn-finish-exercise" class="btn-secondary mt-2">Terminar Ejercicio</button>
        </div>

    </div>

    <!-- Custom Modal Prompt -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-label" class="modal-label"></p>
            <input type="text" id="modal-input" class="modal-input" placeholder="">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="modal-confirm" class="btn-primary">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <!-- Background effects -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <script type="module" src="app.js?v=1.3"></script>
</body>

</html>
